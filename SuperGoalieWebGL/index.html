<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Super Goalie Basic</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>

  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>

      <div id="unity-warning"> </div>

      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Super Goalie Basic</div>
      </div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");

        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }

        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);

        if (type == "error") {
          div.style = "background: red; padding: 10px;";
        } else {
          if (type == "warning") div.style = "background: yellow; padding: 10px;";

          setTimeout(function () {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }

        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/05.05.loader.js";

      var config = {
        arguments: [],
        dataUrl: buildUrl + "/05.05.data",
        frameworkUrl: buildUrl + "/05.05.framework.js",
        codeUrl: buildUrl + "/05.05.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Super Goalie Basic",
        productVersion: "0.1",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
        document.getElementsByTagName("head")[0].appendChild(meta);

        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;

      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        })
          .then((unityInstance) => {
            document.querySelector("#unity-loading-bar").style.display = "none";

            document.querySelector("#unity-fullscreen-button").onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          })
          .catch((message) => {
            alert(message);
          });
      };

      document.body.appendChild(script);
    </script>

    <script>
      const FB_URL = "https://aquachampions2026-default-rtdb.firebaseio.com";
      const RETURN_URL = "https://proyectodigital-2.github.io/AquaGame3D/";

      const _p = new URLSearchParams(window.location.search);

      const SESSION = {
        key: _p.get("key") || null,
        sucId: _p.get("sucId") || null,
        amount: _p.get("amount") || null,
        seq: _p.get("seq") || null,
        branch: _p.get("branch") || null,
      };

      const PRIZE_LABELS = {
        cilindro: "Cilindro AquaChampions",
        playera: "Playera Oficial",
        rompe: "Rompe Vientos",
        hielera: "Hielera AquaChampions",
        balon: "Balon AquaChampions",
        mascara: "Mascara AquaChampions",
      };

      function choosePrize(amount) {
        const weights = {
          200: { cilindro: 50, hielera: 30, mascara: 20 },
          300: { cilindro: 25, playera: 30, hielera: 20, balon: 15, mascara: 10 },
          500: { playera: 35, rompe: 30, balon: 25, hielera: 10 },
        };

        const w = weights[parseInt(amount)] || weights[200];
        const total = Object.values(w).reduce((s, v) => s + v, 0);

        let r = Math.random() * total;

        for (const [k, v] of Object.entries(w)) {
          r -= v;
          if (r <= 0) return k;
        }

        return Object.keys(w)[0];
      }

      async function markUsed(result, prize, ticket) {
        if (!SESSION.key) return;

        const path = SESSION.key.replace(/-/g, "_");

        try {
          await fetch(`${FB_URL}/usadas/${path}.json`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              status: "usada",
              result,
              prize,
              ticket,
              sucId: SESSION.sucId,
              branch: SESSION.branch || "",
              amount: SESSION.amount,
              seq: SESSION.seq,
              fecha: new Date().toLocaleString("es-MX"),
            }),
          });
        } catch (e) {
          console.error("Firebase error:", e);
        }
      }

      async function decrementInventory(sucId, prizeKey) {
        const url = `${FB_URL}/inventario/suc${sucId}/${prizeKey}.json`;

        try {
          const res = await fetch(url);
          const current = await res.json();

          if (current && current > 0) {
            await fetch(url, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(current - 1),
            });
          }
        } catch (e) {
          console.error("Inventario error:", e);
        }
      }

      window.OnGoalScored = async function () {
        const prizeKey = choosePrize(SESSION.amount);
        const prizeLabel = PRIZE_LABELS[prizeKey] || prizeKey;
        const ticket = "AQM-" + SESSION.sucId + "-" + SESSION.amount + "-" + Date.now();

        await markUsed("ganadora", prizeLabel, ticket);

        if (SESSION.sucId) {
          await decrementInventory(SESSION.sucId, prizeKey);
        }

        const params = new URLSearchParams({
          result: "gol",
          prize: prizeLabel,
          ticket: ticket,
          key: SESSION.key || "",
          branch: SESSION.branch || "",
          amount: SESSION.amount || "",
        });

        window.location.href = RETURN_URL + "?" + params.toString();
      };

      window.OnGoalMissed = async function () {
        const ticket = "AQM-" + SESSION.sucId + "-" + SESSION.amount + "-" + Date.now();

        await markUsed("no ganadora", "", ticket);

        const params = new URLSearchParams({
          result: "fallo",
          ticket: ticket,
          key: SESSION.key || "",
          branch: SESSION.branch || "",
          amount: SESSION.amount || "",
        });

        window.location.href = RETURN_URL + "?" + params.toString();
      };
    </script>
  </body>
</html>
