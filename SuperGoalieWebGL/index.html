<!DOCTYPE html>
<html lang="es" translate="no">
<head>
  <meta charset="utf-8">
  <meta name="google" content="notranslate">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Super Goalie</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050e1f; }

    #unity-loading-bar,
    #unity-footer,
    #unity-build-title { display: none !important; }

    #unity-container {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #050e1f;
    }

    #unity-canvas {
      width: 100vw; height: auto;
      aspect-ratio: 960 / 600;
      max-width: 100vw; max-height: 100vh;
      touch-action: none;
    }



    /* ── Menú ── */
    #screen-menu {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(5,14,31,0.88);
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 24px; font-family: Arial, sans-serif;
    }

    #menu-content {
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
      width: 100%; max-width: 380px; margin: auto;
    }

    #screen-menu h1 {
      font-size: clamp(1.6rem,5vw,2.2rem);
      color: #ffaa00; text-align: center;
      text-shadow: 0 0 20px rgba(255,170,0,0.6);
      letter-spacing: 2px;
    }

    #screen-menu p {
      font-size: clamp(0.9rem,2.5vw,1rem);
      color: #ccd9ff; text-align: center; line-height: 1.5;
    }

    #screen-menu p span { color: #1a8fff; }

    #btn-jugar {
      font-size: 1.3rem; color: #fff; letter-spacing: 2px;
      background: linear-gradient(135deg,#ffaa00,#ff8800);
      border: 2px solid #1a5aff; border-radius: 50px;
      padding: 13px 48px; cursor: pointer;
      width: 100%; max-width: 300px;
      box-shadow: 0 4px 20px rgba(255,170,0,0.5);
      transition: transform 0.15s; touch-action: manipulation;
    }

    #btn-jugar:active { transform: scale(0.97); }

    #btn-volver {
      font-size: 0.95rem; color: #1a8fff;
      background: transparent; border: 2px solid #1a8fff;
      border-radius: 50px; padding: 9px 32px;
      cursor: pointer; width: 100%; max-width: 300px;
      transition: transform 0.15s; touch-action: manipulation;
    }

    #btn-volver:active { transform: scale(0.97); }

    /* ── Girar dispositivo ── */




    /* ── Fin de juego ── */
    #screen-end {
      position: fixed; inset: 0; z-index: 300;
      background: #050e1f; display: none;
      flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      font-family: Arial, sans-serif;
    }

    #screen-end .ricon-back {
      font-size: 68px;
      animation: rback 1.5s ease-in-out infinite;
    }

    @keyframes rback {
      0%,100% { transform: rotate(90deg); }
      40%,60%  { transform: rotate(0deg); }
    }

    #screen-end h2 { font-size: 1.6rem; color: #ffaa00; letter-spacing: 3px; text-align: center; }
    #screen-end p  { font-size: 0.95rem; color: #1a8fff; text-align: center; }

    #btn-continuar {
      font-size: 1.3rem; color: #fff; letter-spacing: 2px;
      background: linear-gradient(135deg,#ffaa00,#ff8800);
      border: 2px solid #1a5aff; border-radius: 50px;
      padding: 13px 48px; cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,170,0,0.5);
      touch-action: manipulation;
    }
  </style>
</head>
<body>

  <!-- Menú -->
  <div id="screen-menu">
    <div id="menu-content">
      <h1>¡A PATEAR!</h1>
      <p><span>Pulsa en la pantalla</span> donde quieras colocar el tiro.<br>¡Apunta bien y marca gol!</p>
      <div id="rotate-hint" style="display:none;align-items:center;gap:10px;background:rgba(255,170,0,0.08);border:1px solid rgba(255,170,0,0.3);border-radius:12px;padding:10px 16px;width:100%;max-width:300px;">
        <span style="font-size:1.6rem;">🔄</span>
        <span style="font-size:0.85rem;color:#ffaa00;line-height:1.3;">Gira tu dispositivo a horizontal para mejor experiencia</span>
      </div>
      <button id="btn-jugar">¡JUGAR!</button>
      <button id="btn-volver">← VOLVER AL MENÚ</button>
    </div>
  </div>



  <!-- Fin de juego -->
  <div id="screen-end">
    <div class="ricon-back">📱</div>
    <h2>¡LISTO!</h2>
    <p>Gira tu dispositivo para continuar</p>
    <button id="btn-continuar">CONTINUAR</button>
  </div>

  <!-- Unity -->
  <div id="unity-container">
    <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>
    <div id="unity-warning"></div>
  </div>

  <script>
    var isMobile  = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    var isAndroid = /Android/i.test(navigator.userAgent);
    var isIPad    = /iPad/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    var isIPhone  = /iPhone|iPod/i.test(navigator.userAgent);
    var isIOS     = isIPhone || isIPad;
    var unityInstance = null;
    var unityListo    = false;
    var juegoActivo   = false;

    function show(id) { document.getElementById(id).style.display = 'flex'; }
    function hide(id) { document.getElementById(id).style.display = 'none'; }

    // ── Orientación ──────────────────────────────────────────────
    function checkOrientacion() {
      if (!unityListo) return;
      var hint = document.getElementById('rotate-hint');
      if (hint) hint.style.display = isMobile ? 'flex' : 'none';
      if (!juegoActivo) show('screen-menu');
    }

    window.addEventListener('orientationchange', function() { setTimeout(checkOrientacion, 200); });
    window.addEventListener('resize', checkOrientacion);

    // ── Fullscreen ───────────────────────────────────────────────
    function entrarFullscreen() {
      if (isMobile) {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(function(){});
        }
        window.scrollTo(0, 1);
        return;
      }
      try { if (unityInstance) unityInstance.SetFullscreen(1); } catch(e) {}
    }

    function salirFullscreen() {
      try {
        if (document.exitFullscreen) document.exitFullscreen().catch(function(){});
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
      } catch(e) {}
    }

    function irAlMenu() {
      salirFullscreen();
      window.location.href = '../index.html';
    }

    function mostrarFinDeJuego() {
      juegoActivo = false;
      salirFullscreen();
      if (!isMobile) { irAlMenu(); return; }
      show('screen-end');
    }

    // ── Callbacks Unity ──────────────────────────────────────────
    function NotifyGoalScored()        { mostrarFinDeJuego(); }
    function NotifyGoalMissed()        { mostrarFinDeJuego(); }
    function NotifyPracticaTerminada() { mostrarFinDeJuego(); }

    // ── ESC ──────────────────────────────────────────────────────
    document.addEventListener('fullscreenchange', function() {
      if (!document.fullscreenElement && unityListo && !juegoActivo) checkOrientacion();
    });

    // ── Silenciar requestFullscreen en móvil ─────────────────────
    if (isMobile) {
      var _origRFS = HTMLElement.prototype.requestFullscreen;
      HTMLElement.prototype.requestFullscreen = function() {
        try { return _origRFS ? _origRFS.call(this) : Promise.resolve(); }
        catch(e) { return Promise.resolve(); }
      };
    }

    // ── Botones ──────────────────────────────────────────────────
    document.getElementById('btn-jugar').addEventListener('click', function() {
      juegoActivo = true;
      hide('screen-menu');
      entrarFullscreen();
    });

    document.getElementById('btn-volver').addEventListener('click', irAlMenu);
    document.getElementById('btn-continuar').addEventListener('click', irAlMenu);

    // ── Unity loader ─────────────────────────────────────────────
    var canvas = document.querySelector('#unity-canvas');

    if (isMobile) {
      document.querySelector('#unity-container').className = 'unity-mobile';
      canvas.className = 'unity-mobile';
    } else {
      canvas.style.width  = '960px';
      canvas.style.height = '600px';
    }

    function unityShowBanner(msg, type) {
      var w = document.querySelector('#unity-warning');
      var d = document.createElement('div');
      d.innerHTML = msg;
      w.appendChild(d);
      if (type === 'error') d.style = 'background:red;padding:10px;';
      else if (type === 'warning') {
        d.style = 'background:yellow;padding:10px;';
        setTimeout(function() { w.removeChild(d); }, 5000);
      }
      w.style.display = w.children.length ? 'block' : 'none';
    }

    var buildUrl  = 'Build';
    var loaderUrl = buildUrl + '/05.05.loader.js';
    var config = {
      arguments: [],
      dataUrl:            buildUrl + '/05.05.data',
      frameworkUrl:       buildUrl + '/05.05.framework.js',
      codeUrl:            buildUrl + '/05.05.wasm',
      streamingAssetsUrl: 'StreamingAssets',
      companyName:   'DefaultCompany',
      productName:   'Super Goalie Basic',
      productVersion: '0.1',
      showBanner: unityShowBanner,
    };

    var script = document.createElement('script');
    script.src = loaderUrl;
    script.onload = function() {
      createUnityInstance(canvas, config, function(progress) {
        // Sin barra de progreso — carga directa
      }).then(function(ui) {
        unityInstance = ui;
        unityListo    = true;

        // Desbloquear audio iOS
        var AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          var ctx = new AudioCtx();
          function unlock() {
            if (ctx.state === 'suspended') ctx.resume();
            var b = ctx.createBuffer(1,1,22050);
            var s = ctx.createBufferSource();
            s.buffer = b; s.connect(ctx.destination); s.start(0);
          }
          document.addEventListener('touchstart', unlock, {once:true});
          document.addEventListener('click',      unlock, {once:true});
        }

        // Mostrar menú directamente
        checkOrientacion();

      }).catch(function(msg) { alert(msg); });
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
