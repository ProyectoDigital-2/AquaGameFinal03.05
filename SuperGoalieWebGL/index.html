<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Super Goalie</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; width: 100%; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }

      #unity-container { position: relative; }
      #unity-container.unity-desktop { width: 100vw; height: 100vh; }
      #unity-container.unity-mobile { width: 100%; }

      #unity-canvas { background: #000; }
      #unity-container.unity-desktop #unity-canvas { width: 100%; height: 100%; }

      #unity-loading-bar { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; }
      #unity-logo { width: 154px; height: 130px; background: url('TemplateData/unity-logo-dark.png') no-repeat center; }
      #unity-progress-bar-empty { width: 141px; height: 18px; margin-top: 10px; background: url('TemplateData/progress-bar-empty-dark.png') no-repeat center; }
      #unity-progress-bar-full { width: 0%; height: 18px; background: url('TemplateData/progress-bar-full-dark.png') no-repeat center; }
      #unity-warning { position: absolute; top: 0; left: 0; right: 0; }
      #unity-footer { display: none; } /* Ocultar footer completo */

      /* ── Letreros verticales ───────────────────────── */
      #portrait-hints {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 10px 16px;
        width: 100%;
        background: rgba(0,0,0,0.85);
      }
      #portrait-hints .hint-line {
        font-family: Arial, sans-serif;
        font-size: 0.85rem;
        color: #fff;
        text-align: center;
      }
      #portrait-hints .hint-line.rotate {
        color: #1a8fff;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
      <div id="unity-footer"></div>
    </div>

    <!-- Letreros solo en vertical móvil -->
    <div id="portrait-hints">
      <div class="hint-line">⚽ Da click donde quieres lanzar el penal</div>
      <div class="hint-line rotate">🔄 Gira para una mejor vista</div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/05.05.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/05.05.data.unityweb",
        frameworkUrl: buildUrl + "/05.05.framework.js.unityweb",
        codeUrl: buildUrl + "/05.05.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Super Goalie Basic",
        productVersion: "0.1",
        showBanner: unityShowBanner,
      };

      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      function applyLayout() {
        var container = document.querySelector("#unity-container");
        var hints = document.getElementById("portrait-hints");
        var isPortrait = window.innerHeight > window.innerWidth;

        if (isMobile) {
          var meta = document.querySelector('meta[name=viewport]');
          if (!meta) {
            meta = document.createElement('meta');
            meta.name = 'viewport';
            document.getElementsByTagName('head')[0].appendChild(meta);
          }
          meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
          container.className = "unity-mobile";
          canvas.className = "unity-mobile";

          if (isPortrait) {
            // Vertical: canvas ocupa ancho completo, altura proporcional
            var w = window.innerWidth;
            var h = Math.round(w * (600 / 960));
            canvas.style.width = w + "px";
            canvas.style.height = h + "px";
            hints.style.display = "flex";
          } else {
            // Horizontal: pantalla completa
            canvas.style.width = window.innerWidth + "px";
            canvas.style.height = window.innerHeight + "px";
            hints.style.display = "none";
          }
        } else {
          // Desktop: siempre pantalla completa
          container.className = "unity-desktop";
          canvas.style.width = window.innerWidth + "px";
          canvas.style.height = window.innerHeight + "px";
          hints.style.display = "none";

          // Fullscreen automático en desktop
          if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(function(){});
          }
        }
      }

      applyLayout();
      window.addEventListener("resize", function() { setTimeout(applyLayout, 100); });
      window.addEventListener("orientationchange", function() { setTimeout(applyLayout, 200); });

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          applyLayout();
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
