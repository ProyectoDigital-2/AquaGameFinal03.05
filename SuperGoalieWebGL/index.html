<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Super Goalie</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: radial-gradient(ellipse at center, #0a1628 0%, #000 100%);
        width: 100%; height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      /* Canvas siempre en DOM, nunca se destruye */
      #canvas-frame {
        border: 3px solid rgba(26,143,255,0.7);
        border-radius: 12px;
        box-shadow: 0 0 24px rgba(26,143,255,0.5), 0 0 60px rgba(26,143,255,0.15);
        overflow: hidden;
        flex-shrink: 0;
        display: block;
      }
      #unity-canvas { background: #000; display: block; }

      /* Loading bar centrada sobre el canvas */
      #unity-loading-bar {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%); display: none; z-index: 10;
      }
      #unity-logo { width: 154px; height: 130px; background: url('TemplateData/unity-logo-dark.png') no-repeat center; }
      #unity-progress-bar-empty { width: 141px; height: 18px; margin-top: 10px; background: url('TemplateData/progress-bar-empty-dark.png') no-repeat center; }
      #unity-progress-bar-full { width: 0%; height: 18px; background: url('TemplateData/progress-bar-full-dark.png') no-repeat center; }
      #unity-warning { position: fixed; top: 0; left: 0; right: 0; z-index: 20; }
      #unity-footer { display: none; }

      /* Logo AquaChampions */
      #logo-aqua {
        width: 65px; height: 65px;
        border-radius: 50%;
        background: white;
        display: none;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        box-shadow: 0 0 16px rgba(26,100,255,0.4);
        flex-shrink: 0;
        margin-top: 10px;
      }
      #logo-aqua img { width: 100%; height: 100%; object-fit: contain; }

      /* Letreros */
      #portrait-hints {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        width: 100%;
        margin-top: 8px;
      }
      .hint-card {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 14px;
        border-radius: 12px;
      }
      .hint-card.kick {
        background: linear-gradient(135deg, rgba(255,180,0,0.18), rgba(255,100,0,0.1));
        border: 1px solid rgba(255,180,0,0.45);
        box-shadow: 0 0 10px rgba(255,150,0,0.2);
      }
      .hint-card.rotate {
        background: linear-gradient(135deg, rgba(26,143,255,0.18), rgba(0,200,255,0.1));
        border: 1px solid rgba(26,143,255,0.45);
        box-shadow: 0 0 10px rgba(26,143,255,0.2);
      }
      .hint-emoji { font-size: 1.4rem; flex-shrink: 0; }
      .hint-text { font-family: Arial, sans-serif; font-size: 0.78rem; line-height: 1.3; }
      .hint-card.kick .hint-text { color: #ffd080; }
      .hint-card.rotate .hint-text { color: #80d0ff; }
      .hint-text strong { display: block; font-size: 0.85rem; margin-bottom: 1px; }
      .hint-card.kick .hint-text strong { color: #ffb300; }
      .hint-card.rotate .hint-text strong { color: #1a8fff; }
    </style>
  </head>
  <body>

    <div id="canvas-frame">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <div id="logo-aqua">
      <img src="https://proyectodigital-2.github.io/Aqua-Champions/img/logo.png" alt="AquaChampions"
           onerror="this.parentElement.style.display='none'">
    </div>

    <div id="portrait-hints">
      <div class="hint-card kick">
        <div class="hint-emoji">⚽</div>
        <div class="hint-text">
          <strong>¡Lanza el penal!</strong>
          Toca donde quieres colocar el tiro
        </div>
      </div>
      <div class="hint-card rotate">
        <div class="hint-emoji">🔄</div>
        <div class="hint-text">
          <strong>Mejor vista</strong>
          Gira tu dispositivo en horizontal
        </div>
      </div>
    </div>

    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"></div>
    <div id="unity-footer"></div>

    <script>
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      var canvas = document.getElementById("unity-canvas");
      var frame = document.getElementById("canvas-frame");
      var logo = document.getElementById("logo-aqua");
      var hints = document.getElementById("portrait-hints");

      if (isMobile) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      function applyLayout() {
        var portrait = isMobile && window.innerHeight > window.innerWidth;

        if (portrait) {
          // Marco visible
          frame.style.borderRadius = "12px";
          frame.style.boxShadow = "0 0 24px rgba(26,143,255,0.5), 0 0 60px rgba(26,143,255,0.15)";
          frame.style.border = "3px solid rgba(26,143,255,0.7)";
          logo.style.display = "flex";
          hints.style.display = "flex";

          var reservedH = 175; // logo + hints + gaps
          var pad = 24;
          var maxW = window.innerWidth - pad;
          var maxH = window.innerHeight - reservedH;
          var w = Math.min(maxW, Math.round(maxH * (960/600)));
          var h = Math.round(w * (600/960));

          canvas.style.width = w + "px";
          canvas.style.height = h + "px";

          // Ajustar ancho de hints al canvas
          hints.style.width = w + "px";
          logo.style.marginTop = "10px";

        } else {
          // Horizontal o desktop: sin marco, fullscreen
          frame.style.borderRadius = "0";
          frame.style.boxShadow = "none";
          frame.style.border = "none";
          logo.style.display = "none";
          hints.style.display = "none";

          canvas.style.width = window.innerWidth + "px";
          canvas.style.height = window.innerHeight + "px";

          if (!isMobile && document.documentElement.requestFullscreen && !document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(function(){});
          }
        }
      }

      applyLayout();

      function unityShowBanner(msg, type) {
        var wb = document.querySelector("#unity-warning");
        if (!wb) return;
        var div = document.createElement('div');
        div.innerHTML = msg;
        wb.appendChild(div);
        if (type == 'error') div.style = 'background:red;padding:10px;';
        else {
          if (type == 'warning') div.style = 'background:yellow;padding:10px;';
          setTimeout(function() { wb.removeChild(div); }, 5000);
        }
      }

      var buildUrl = "Build";
      var config = {
        arguments: [],
        dataUrl:      buildUrl + "/05.05.data.unityweb",
        frameworkUrl: buildUrl + "/05.05.framework.js.unityweb",
        codeUrl:      buildUrl + "/05.05.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Super Goalie Basic",
        productVersion: "0.1",
        showBanner: unityShowBanner,
      };

      document.getElementById("unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = buildUrl + "/05.05.loader.js";
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((ui) => {
          document.getElementById("unity-loading-bar").style.display = "none";
          applyLayout();
        }).catch((msg) => { alert(msg); });
      };
      document.body.appendChild(script);

      window.addEventListener("orientationchange", function() { setTimeout(applyLayout, 300); });
      window.addEventListener("resize", function() { setTimeout(applyLayout, 150); });
    </script>
  </body>
</html>
