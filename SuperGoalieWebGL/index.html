<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

  <title>Super Goalie</title>

  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600&display=swap" rel="stylesheet">

  <meta name="viewport"
    content="width=device-width,
    height=device-height,
    initial-scale=1,
    maximum-scale=1,
    user-scalable=no,
    viewport-fit=cover">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      position: fixed;
      overscroll-behavior: none;
      touch-action: manipulation;
      background: #050e1f;
    }

    /* ── Unity ── */
    #unity-container {
      position: fixed; inset: 0;
      display: flex;
      align-items: center; justify-content: center;
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #050e1f;
    }

    #unity-canvas {
      width: 100vw; height: auto;
      aspect-ratio: 960 / 600;
      max-width: 100vw; max-height: 100vh;
      object-fit: contain;
      touch-action: none;
      background: #050e1f;
    }

    #unity-loading-bar,
    #unity-footer,
    #unity-build-title { display: none !important; }

    /* ── Loading ── */
    #screen-loading {
      position: fixed; inset: 0; z-index: 100;
      background: #050e1f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }

    #screen-loading .ball {
      font-size: 72px;
      animation: spin 1.2s linear infinite;
      filter: drop-shadow(0 0 20px rgba(255,170,0,0.7));
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #screen-loading h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem; color: #ffaa00;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(255,170,0,0.6);
    }

    .bar-wrap {
      width: 220px; height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px; overflow: hidden;
    }

    .bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg,#ffaa00,#ff8800);
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    /* ── Menú ── */
    #screen-menu {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(5,14,31,0.85);
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 24px;
    }

    #menu-content {
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      width: 100%; max-width: 400px;
      margin: auto;
    }

    #screen-menu .ball-icon {
      font-size: 56px;
      animation: bounce 1s ease infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-10px); }
    }

    #screen-menu h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem; color: #ffaa00;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(255,170,0,0.7);
      text-align: center;
    }

    #screen-menu p {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem; color: #ccd9ff;
      text-align: center; line-height: 1.5;
    }

    #screen-menu p span { color: #1a8fff; }

    #btn-jugar {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem; letter-spacing: 3px; color: #fff;
      background: linear-gradient(135deg,#ffaa00,#ff8800);
      border: 2px solid #1a5aff; border-radius: 50px;
      padding: 14px 52px; cursor: pointer;
      width: 100%; max-width: 320px;
      box-shadow: 0 4px 24px rgba(255,170,0,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
      touch-action: manipulation;
    }

    #btn-jugar:hover, #btn-jugar:active {
      transform: scale(1.05);
      box-shadow: 0 6px 32px rgba(255,170,0,0.7);
    }

    #btn-volver {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: 2px;
      color: #1a8fff; background: transparent;
      border: 2px solid #1a8fff; border-radius: 50px;
      padding: 10px 36px; cursor: pointer;
      width: 100%; max-width: 320px;
      transition: transform 0.15s, background 0.15s;
      touch-action: manipulation;
    }

    #btn-volver:hover, #btn-volver:active {
      transform: scale(1.04);
      background: rgba(26,143,255,0.1);
    }

    /* ── Countdown ── */
    #screen-countdown {
      display: none;
      position: fixed; inset: 0; z-index: 250;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.4);
    }

    #countdown-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22vw; color: #fff; line-height: 1;
      text-shadow:
        0 0 40px rgba(255,170,0,0.9),
        0 0 80px rgba(26,90,255,0.5);
    }

    #countdown-num.pulse {
      animation: cpulse 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cpulse {
      from { transform: scale(1.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* ── Girar dispositivo (inicio) ── */
    #screen-rotate {
      position: fixed; inset: 0; z-index: 300;
      background: #050e1f;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }

    #screen-rotate .ricon {
      font-size: 64px;
      animation: rphone 1.5s ease-in-out infinite;
    }

    @keyframes rphone {
      0%  { transform: rotate(0deg); }
      40% { transform: rotate(90deg); }
      60% { transform: rotate(90deg); }
      100%{ transform: rotate(0deg); }
    }

    #screen-rotate h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; color: #ffaa00;
      letter-spacing: 3px; text-align: center;
    }

    #screen-rotate p {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem; color: #1a8fff; text-align: center;
    }

    /* ── Fin de juego (girar de vuelta) ── */
    #screen-end {
      position: fixed; inset: 0; z-index: 300;
      background: #050e1f;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }

    #screen-end .ricon-back {
      font-size: 72px;
      animation: rback 1.5s ease-in-out infinite;
    }

    @keyframes rback {
      0%  { transform: rotate(90deg); }
      40% { transform: rotate(0deg); }
      60% { transform: rotate(0deg); }
      100%{ transform: rotate(90deg); }
    }

    #screen-end h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; color: #ffaa00;
      letter-spacing: 3px; text-align: center;
    }

    #screen-end p {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem; color: #1a8fff; text-align: center;
    }

    #btn-continuar {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; letter-spacing: 3px; color: #fff;
      background: linear-gradient(135deg,#ffaa00,#ff8800);
      border: 2px solid #1a5aff; border-radius: 50px;
      padding: 14px 52px; cursor: pointer;
      box-shadow: 0 4px 24px rgba(255,170,0,0.5);
      touch-action: manipulation;
      transition: transform 0.15s;
    }

    #btn-continuar:hover, #btn-continuar:active {
      transform: scale(1.05);
    }

  </style>
</head>
<body>

  <!-- Loading -->
  <div id="screen-loading">
    <div class="ball">⚽</div>
    <h2>CARGANDO...</h2>
    <div class="bar-wrap">
      <div class="bar-fill" id="bar-fill"></div>
    </div>
  </div>

  <!-- Menú -->
  <div id="screen-menu">
    <div id="menu-content">
      <div class="ball-icon">⚽</div>
      <h1>¡A PATEAR!</h1>
      <p><span>Pulsa en la pantalla</span> donde quieras colocar el tiro.<br>¡Apunta bien y marca gol!</p>
      <button id="btn-jugar">¡JUGAR!</button>
      <button id="btn-volver">← VOLVER AL MENÚ</button>
    </div>
  </div>

  <!-- Countdown -->
  <div id="screen-countdown">
    <div id="countdown-num">3</div>
  </div>

  <!-- Girar al inicio -->
  <div id="screen-rotate">
    <div class="ricon">📱</div>
    <h2>GIRA TU DISPOSITIVO</h2>
    <p>El juego se ve mejor en horizontal</p>
  </div>

  <!-- Fin de juego -->
  <div id="screen-end">
    <div class="ricon-back">📱</div>
    <h2>¡LISTO!</h2>
    <p>Gira tu dispositivo para continuar</p>
    <button id="btn-continuar">CONTINUAR</button>
  </div>

  <!-- Unity -->
  <div id="unity-container">
    <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>
    <div id="unity-warning"></div>
  </div>

  <script>

    var isMobile  = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    var isAndroid = /Android/i.test(navigator.userAgent);
    var isIPad    = /iPad/i.test(navigator.userAgent) ||
                    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    var isIPhone  = /iPhone|iPod/i.test(navigator.userAgent);
    var isIOS     = isIPhone || isIPad;
    var unityInstance = null;
    var unityLoaded   = false;
    var juegoActivo   = false;

    // ── UI helpers ───────────────────────────────────────────────
    function show(id) { document.getElementById(id).style.display = 'flex'; }
    function hide(id) { document.getElementById(id).style.display = 'none'; }

    // ── Ajuste canvas iOS ────────────────────────────────────────
    function ajustarCanvasIOS() {
      var canvas = document.getElementById('unity-canvas');
      if (!canvas) return;
      var vw = window.innerWidth;
      var vh = window.innerHeight;
      var ratio = 960 / 600;
      var w = vw;
      var h = w / ratio;
      if (h > vh) { h = vh; w = h * ratio; }
      canvas.style.width  = w + 'px';
      canvas.style.height = h + 'px';
    }

    // ── Orientación ──────────────────────────────────────────────
    function checkOrientacion() {
      if (!isMobile) {
        hide('screen-rotate');
        if (!juegoActivo) show('screen-menu');
        return;
      }
      var portrait = window.innerHeight > window.innerWidth;
      if (portrait) {
        show('screen-rotate');
        if (!juegoActivo) hide('screen-menu');
      } else {
        hide('screen-rotate');
        if (!juegoActivo) show('screen-menu');
      }
    }

    window.addEventListener('orientationchange', function() {
      setTimeout(function() {
        if (isIOS) ajustarCanvasIOS();
        checkOrientacion();
      }, 300);
    });

    window.addEventListener('resize', function() {
      if (isIOS) ajustarCanvasIOS();
    });

    // ── Fullscreen ───────────────────────────────────────────────
    async function entrarFullscreen() {
      if (isAndroid || isIPad) {
        try {
          var el = document.documentElement;
          if (el.requestFullscreen) await el.requestFullscreen();
          else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
          if (screen.orientation && screen.orientation.lock) {
            try { await screen.orientation.lock('landscape'); } catch(e) {}
          }
        } catch(e) { console.warn('Fullscreen:', e); }
        return;
      }
      if (isIPhone) {
        try {
          if (screen.orientation && screen.orientation.lock) {
            try { await screen.orientation.lock('landscape'); } catch(e) {}
          }
          window.scrollTo(0, 1);
          ajustarCanvasIOS();
          setTimeout(function() {
            window.scrollTo(0, 1);
            ajustarCanvasIOS();
          }, 300);
        } catch(e) {}
        return;
      }
      // PC
      try {
        if (unityInstance) unityInstance.SetFullscreen(1);
      } catch(e) {}
    }

    function salirFullscreen() {
      try {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
      } catch(e) {}
    }

    // ── ESC / salida de fullscreen ───────────────────────────────
    function onSalidaFullscreen() {
      if (!unityLoaded) return;
      juegoActivo = false;
      hide('screen-countdown');
      hide('screen-end');
      document.getElementById('countdown-num').textContent = '3';
      document.getElementById('menu-content').style.display = 'flex';
      checkOrientacion();
    }

    document.addEventListener('fullscreenchange', function() {
      if (!document.fullscreenElement) onSalidaFullscreen();
    });
    document.addEventListener('webkitfullscreenchange', function() {
      if (!document.webkitFullscreenElement) onSalidaFullscreen();
    });

    // ── Ir al menú principal ─────────────────────────────────────
    function irAlMenu() {
      salirFullscreen();
      window.location.href = '../index.html';
    }

    // ── Fin de juego (callbacks de Unity) ────────────────────────
    function mostrarFinDeJuego() {
      juegoActivo = false;
      salirFullscreen();

      if (!isMobile) {
        // PC: ir directo al menú
        irAlMenu();
        return;
      }

      // Móvil: mostrar pantalla con botón CONTINUAR
      // El usuario decide cuando presionar, sin auto-regreso accidental
      if (screen.orientation && screen.orientation.unlock) {
        screen.orientation.unlock();
      }
      show('screen-end');
    }

    // Llamados desde Unity C# via DllImport
    function NotifyGoalScored()        { mostrarFinDeJuego(); }
    function NotifyGoalMissed()        { mostrarFinDeJuego(); }
    function NotifyPracticaTerminada() { mostrarFinDeJuego(); }

    // ── Cuenta regresiva ─────────────────────────────────────────
    function pulsar(el) {
      el.classList.remove('pulse');
      void el.offsetWidth;
      el.classList.add('pulse');
    }

    function iniciarCuentaYJugar() {
      var el = document.getElementById('countdown-num');
      var n = 3;
      el.textContent = n;
      pulsar(el);

      var iv = setInterval(function() {
        n--;
        if (n > 0) {
          el.textContent = n;
          pulsar(el);
        } else {
          clearInterval(iv);
          el.textContent = '¡YA!';
          pulsar(el);
          setTimeout(function() {
            hide('screen-countdown');
            el.textContent = '3'; // reset para próxima vez
          }, 1200);
        }
      }, 1000);
    }

    // ── Botón JUGAR ──────────────────────────────────────────────
    document.getElementById('btn-jugar').addEventListener('click', async function() {
      juegoActivo = true;

      // En Android/iPad: esperar confirmación de fullscreen antes de la cuenta
      if (isAndroid || isIPad) {
        var fsConfirmado = false;

        function arrancarJuego() {
          if (fsConfirmado) return;
          fsConfirmado = true;
          document.removeEventListener('fullscreenchange', arrancarJuego);
          document.removeEventListener('webkitfullscreenchange', arrancarJuego);
          document.getElementById('menu-content').style.display = 'none';
          show('screen-countdown');
          iniciarCuentaYJugar();
        }

        // Si YA está en fullscreen (segunda partida), arrancar directo
        if (document.fullscreenElement || document.webkitFullscreenElement) {
          arrancarJuego();
        } else {
          // Esperar confirmación de fullscreen
          document.addEventListener('fullscreenchange', arrancarJuego);
          document.addEventListener('webkitfullscreenchange', arrancarJuego);

          // Si falla con error, arrancar de todas formas
          entrarFullscreen().catch(function() { arrancarJuego(); });
        }

      } else {
        // iPhone y PC: arrancar directo
        await entrarFullscreen();
        document.getElementById('menu-content').style.display = 'none';
        show('screen-countdown');
        iniciarCuentaYJugar();
      }
    });

    // ── Botones ──────────────────────────────────────────────────
    document.getElementById('btn-volver').addEventListener('click', irAlMenu);
    document.getElementById('btn-continuar').addEventListener('click', irAlMenu);

    // ── Bloquear requestFullscreen en iPhone ─────────────────────
    if (isIPhone) {
      HTMLElement.prototype.requestFullscreen = function() {
        return Promise.resolve();
      };
    }

    // ── Unity loader ─────────────────────────────────────────────
    var canvas = document.querySelector('#unity-canvas');

    function unityShowBanner(msg, type) {
      var w = document.querySelector('#unity-warning');
      var d = document.createElement('div');
      d.innerHTML = msg;
      w.appendChild(d);
      if (type === 'error') d.style = 'background:red;padding:10px;';
      else if (type === 'warning') {
        d.style = 'background:yellow;padding:10px;';
        setTimeout(function() { w.removeChild(d); w.style.display = w.children.length ? 'block' : 'none'; }, 5000);
      }
      w.style.display = w.children.length ? 'block' : 'none';
    }

    var buildUrl  = 'Build';
    var loaderUrl = buildUrl + '/05.05.loader.js';
    var config = {
      arguments: [],
      dataUrl:            buildUrl + '/05.05.data',
      frameworkUrl:       buildUrl + '/05.05.framework.js',
      codeUrl:            buildUrl + '/05.05.wasm',
      streamingAssetsUrl: 'StreamingAssets',
      companyName:   'DefaultCompany',
      productName:   'Super Goalie Basic',
      productVersion: '0.1',
      showBanner: unityShowBanner,
    };

    canvas.style.visibility = 'hidden';

    var script = document.createElement('script');
    script.src = loaderUrl;
    script.onload = function() {

      // Progreso simulado suave — dentro del onload para que el loader ya esté listo
      var fakeP  = 0;
      var fakeIv = setInterval(function() {
        if (fakeP < 80) {
          fakeP += 0.4;
          document.getElementById('bar-fill').style.width = fakeP + '%';
        } else {
          clearInterval(fakeIv);
        }
      }, 80);

      createUnityInstance(canvas, config, function(progress) {
        clearInterval(fakeIv);
        document.getElementById('bar-fill').style.width = (80 + progress * 20) + '%';
      }).then(function(ui) {
        clearInterval(fakeIv);
        unityInstance = ui;
        unityLoaded   = true;

        // Desbloquear audio iOS
        var AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          var ctx = new AudioCtx();
          function unlock() {
            if (ctx.state === 'suspended') ctx.resume();
            var b = ctx.createBuffer(1,1,22050);
            var s = ctx.createBufferSource();
            s.buffer = b; s.connect(ctx.destination); s.start(0);
            document.removeEventListener('touchstart', unlock);
            document.removeEventListener('click', unlock);
          }
          document.addEventListener('touchstart', unlock, {once:true});
          document.addEventListener('click',      unlock, {once:true});
        }

        // Mostrar canvas y ocultar loading
        canvas.style.visibility = 'visible';
        if (isIOS) ajustarCanvasIOS();

        var loading = document.getElementById('screen-loading');
        var h2 = loading.querySelector('h2');
        if (h2) h2.textContent = '¡LISTO!';
        document.getElementById('bar-fill').style.width = '100%';

        setTimeout(function() {
          loading.style.transition = 'opacity 0.4s';
          loading.style.opacity = '0';
          setTimeout(function() {
            loading.style.display = 'none';
            checkOrientacion(); // mostrar menú
          }, 400);
        }, 600);

      }).catch(function(msg) { alert(msg); });
    };

    document.body.appendChild(script);

  </script>
</body>
</html>
