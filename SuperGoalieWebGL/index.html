<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Super Goalie</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #000;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      #unity-container { position: relative; }
      #unity-container.unity-desktop { width: 100vw; height: 100vh; }
      #unity-canvas { background: #000; display: block; }
      #unity-loading-bar {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%); display: none;
      }
      #unity-logo { width: 154px; height: 130px; background: url('TemplateData/unity-logo-dark.png') no-repeat center; }
      #unity-progress-bar-empty { width: 141px; height: 18px; margin-top: 10px; background: url('TemplateData/progress-bar-empty-dark.png') no-repeat center; }
      #unity-progress-bar-full { width: 0%; height: 18px; background: url('TemplateData/progress-bar-full-dark.png') no-repeat center; }
      #unity-warning { position: absolute; top: 0; left: 0; right: 0; }
      #unity-footer { display: none; }

      /* ── Wrapper vertical ─────────────────────────── */
      #portrait-wrapper {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100vh;
        background: radial-gradient(ellipse at center, #0a1628 0%, #000 100%);
      }

      /* Marco del canvas */
      #canvas-frame {
        border: 3px solid rgba(26,143,255,0.6);
        border-radius: 12px;
        box-shadow:
          0 0 20px rgba(26,143,255,0.4),
          0 0 60px rgba(26,143,255,0.15),
          inset 0 0 20px rgba(0,0,0,0.5);
        overflow: hidden;
        position: relative;
      }

      /* ── Letreros ─────────────────────────────────── */
      #portrait-hints {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        margin-top: 16px;
        width: 90%;
        max-width: 400px;
      }

      .hint-card {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        border-radius: 12px;
        backdrop-filter: blur(8px);
      }

      .hint-card.kick {
        background: linear-gradient(135deg, rgba(255,180,0,0.15), rgba(255,100,0,0.1));
        border: 1px solid rgba(255,180,0,0.4);
        box-shadow: 0 0 12px rgba(255,150,0,0.2);
      }

      .hint-card.rotate {
        background: linear-gradient(135deg, rgba(26,143,255,0.15), rgba(0,200,255,0.1));
        border: 1px solid rgba(26,143,255,0.4);
        box-shadow: 0 0 12px rgba(26,143,255,0.2);
      }

      .hint-emoji {
        font-size: 1.6rem;
        flex-shrink: 0;
      }

      .hint-text {
        font-family: Arial, sans-serif;
        font-size: 0.82rem;
        line-height: 1.3;
      }

      .hint-card.kick .hint-text { color: #ffd080; }
      .hint-card.rotate .hint-text { color: #80d0ff; }

      .hint-text strong {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 2px;
      }

      .hint-card.kick .hint-text strong { color: #ffb300; }
      .hint-card.rotate .hint-text strong { color: #1a8fff; }
    </style>
  </head>
  <body>

    <!-- MODO VERTICAL MÓVIL -->
    <div id="portrait-wrapper">
      <div id="canvas-frame">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
      </div>
      <div id="portrait-hints">
        <div class="hint-card kick">
          <div class="hint-emoji">⚽</div>
          <div class="hint-text">
            <strong>¡Lanza el penal!</strong>
            Toca donde quieres colocar el tiro
          </div>
        </div>
        <div class="hint-card rotate">
          <div class="hint-emoji">🔄</div>
          <div class="hint-text">
            <strong>Mejor vista</strong>
            Gira tu dispositivo en horizontal
          </div>
        </div>
      </div>
    </div>

    <!-- MODO DESKTOP / HORIZONTAL -->
    <div id="unity-container" class="unity-desktop" style="display:none">
      <canvas id="unity-canvas-desktop" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
      <div id="unity-footer"></div>
    </div>

    <script>
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      // Elegir canvas correcto
      var canvas;
      var portraitWrapper = document.getElementById("portrait-wrapper");
      var desktopContainer = document.getElementById("unity-container");

      function setupCanvases() {
        var isPortrait = window.innerHeight > window.innerWidth;
        if (isMobile && isPortrait) {
          portraitWrapper.style.display = "flex";
          desktopContainer.style.display = "none";
          canvas = document.getElementById("unity-canvas");
          // Tamaño canvas: ancho pantalla - padding del marco
          var availH = window.innerHeight - 140; var w = Math.min(window.innerWidth - 24, Math.round(availH * (960/600)), 500);
          var h = Math.round(w * (600 / 960));
          canvas.style.width = w + "px";
          canvas.style.height = h + "px";
          canvas.width = w;
          canvas.height = h;
        } else {
          portraitWrapper.style.display = "none";
          desktopContainer.style.display = "block";
          canvas = document.getElementById("unity-canvas-desktop");
          canvas.style.width = window.innerWidth + "px";
          canvas.style.height = window.innerHeight + "px";
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
      }

      setupCanvases();

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        if (!warningBanner) return;
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() { warningBanner.removeChild(div); }, 5000);
        }
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/05.05.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/05.05.data.unityweb",
        frameworkUrl: buildUrl + "/05.05.framework.js.unityweb",
        codeUrl: buildUrl + "/05.05.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Super Goalie Basic",
        productVersion: "0.1",
        showBanner: unityShowBanner,
      };

      if (isMobile) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      // Mostrar loading bar
      var lb = document.querySelector("#unity-loading-bar");
      if (lb) lb.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          var bar = document.querySelector("#unity-progress-bar-full");
          if (bar) bar.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          if (lb) lb.style.display = "none";
          // Desktop: pantalla completa automática
          if (!isMobile && document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(function(){});
          }
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);

      // Reajustar al girar
      window.addEventListener("orientationchange", function() { setTimeout(setupCanvases, 200); });
      window.addEventListener("resize", function() { setTimeout(setupCanvases, 100); });
    </script>
  </body>
</html>
