<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Aqua Champions 2026</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        background: #000;
        overflow: hidden;
      }
    </style>
    <style>
      /* Forzar canvas a llenar pantalla completa */
      :fullscreen #unity-container,
      :-webkit-full-screen #unity-container,
      :-moz-full-screen #unity-container {
        width: 100vw !important;
        height: 100vh !important;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }
      :fullscreen #unity-canvas,
      :-webkit-full-screen #unity-canvas,
      :-moz-full-screen #unity-canvas {
        width: 100% !important;
        height: 100% !important;
      }
      #play-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #000E1F;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
      }
      #play-btn {
        background: linear-gradient(135deg, #FF6B00, #e85d00);
        color: white;
        border: none;
        border-radius: 50px;
        padding: 18px 48px;
        font-size: 22px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 6px 24px rgba(255,107,0,0.6);
        letter-spacing: 1px;
        animation: pulse 1.8s infinite;
      }
      @keyframes pulse {
        0%,100% { transform: scale(1); box-shadow: 0 6px 24px rgba(255,107,0,0.6); }
        50%      { transform: scale(1.06); box-shadow: 0 10px 32px rgba(255,107,0,0.9); }
      }
    </style>
  </head>
  <body>
    <!-- Pantalla de inicio -->
    <div id="play-overlay">
      <div style="color:#FF6B00;font-size:13px;font-family:sans-serif;letter-spacing:2px;font-weight:bold;">AQUA CHAMPIONS 2026</div>
      <button id="play-btn" onclick="startGame()">⚽ ¡Jugar!</button>
    </div>

    <div id="unity-container" class="unity-desktop">
      <div id="unity-top-bar" style="display:flex;align-items:center;justify-content:center;padding:6px;background:#000;">
        <button id="unity-fullscreen-button-custom" style="
          background: linear-gradient(135deg,#FF6B00,#e85d00);
          color: white;
          border: none;
          border-radius: 10px;
          padding: 8px 22px;
          font-size: 15px;
          font-weight: bold;
          cursor: pointer;
          display: flex;
          align-items: center;
          gap: 8px;
          box-shadow: 0 4px 12px rgba(255,107,0,0.5);
        ">⛶ Pantalla Completa</button>
      </div>
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer" style="display:none">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var unityInstanceRef = null;

      function startGame() {
        // Ocultar overlay y barra superior
        document.getElementById("play-overlay").style.display = "none";
        document.getElementById("unity-top-bar").style.display = "none";

        // Usar SetFullscreen de Unity (el que sí funciona)
        if (unityInstanceRef) {
          unityInstanceRef.SetFullscreen(1);
        } else {
          // Unity aún no cargó — activar cuando esté listo
          window._pendingFullscreen = true;
        }
      }

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/05.05.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/05.05.data",
        frameworkUrl: buildUrl + "/05.05.framework.js",
        codeUrl: buildUrl + "/05.05.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Super Goalie Basic",
        productVersion: "0.1",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          unityInstanceRef = unityInstance;

          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };
          document.querySelector("#unity-fullscreen-button-custom").onclick = () => {
            unityInstance.SetFullscreen(1);
          };

          // Si el usuario ya hizo click antes de que cargara Unity
          if (window._pendingFullscreen || document.getElementById("play-overlay").style.display === "none") {
            unityInstance.SetFullscreen(1);
            window._pendingFullscreen = false;
          }
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
