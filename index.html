<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Super Goalie</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>

      * { box-sizing: border-box; }

      /* ── Girar dispositivo AL INICIO (portrait → pide girar) ── */
      #rotate-overlay {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #050e1f;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
      }
      #rotate-overlay.visible { display: flex; }
      #rotate-overlay .rotate-icon {
        font-size: 64px;
        animation: rotatePhone 1.5s ease-in-out infinite;
      }
      @keyframes rotatePhone {
        0%   { transform: rotate(0deg);  }
        40%  { transform: rotate(90deg); }
        60%  { transform: rotate(90deg); }
        100% { transform: rotate(0deg);  }
      }
      #rotate-overlay h2 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.8rem;
        color: #ffaa00;
        letter-spacing: 3px;
        text-shadow: 0 0 20px rgba(255,170,0,0.6);
        text-align: center;
        margin: 0;
      }
      #rotate-overlay p {
        font-family: 'Rajdhani', sans-serif;
        font-size: 1rem;
        color: #1a8fff;
        letter-spacing: 1px;
        text-align: center;
        margin: 0;
      }

      /* ── Overlay AL TERMINAR (pide girar de vuelta + botón continuar) ── */
      #end-rotate-overlay {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #050e1f;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
      }
      #end-rotate-overlay.visible { display: flex; }

      #end-rotate-overlay .rotate-icon-end {
        font-size: 72px;
        animation: rotatePhoneBack 1.5s ease-in-out infinite;
      }
      @keyframes rotatePhoneBack {
        0%   { transform: rotate(90deg); }
        40%  { transform: rotate(0deg);  }
        60%  { transform: rotate(0deg);  }
        100% { transform: rotate(90deg); }
      }
      #end-rotate-overlay h2 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.8rem;
        color: #ffaa00;
        letter-spacing: 3px;
        text-shadow: 0 0 20px rgba(255,170,0,0.6);
        text-align: center;
        margin: 0;
      }
      #end-rotate-overlay p {
        font-family: 'Rajdhani', sans-serif;
        font-size: 1rem;
        color: #1a8fff;
        letter-spacing: 1px;
        text-align: center;
        margin: 0;
      }
      #btn-continuar {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.4rem;
        letter-spacing: 3px;
        color: #fff;
        background: linear-gradient(135deg, #ffaa00, #ff8800);
        border: 2px solid #1a5aff;
        border-radius: 50px;
        padding: 14px 52px;
        cursor: pointer;
        margin-top: 8px;
        transition: transform 0.15s, box-shadow 0.15s;
        box-shadow: 0 4px 24px rgba(255,170,0,0.5);
        touch-action: manipulation;
      }
      #btn-continuar:hover,
      #btn-continuar:active {
        transform: scale(1.06);
        box-shadow: 0 6px 32px rgba(255,170,0,0.7);
      }

      /* ── Overlay de instrucciones ── */
      #intro-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(0, 10, 30, 0.88);
        display: none;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(4px);
        overflow-y: auto;
        padding: 16px;
      }
      #intro-overlay.visible { display: flex; }

      #intro-box {
        background: linear-gradient(145deg, #050e1f, #0a1a3a);
        border: 3px solid #ffaa00;
        border-radius: 20px;
        padding: 24px 32px;
        text-align: center;
        width: 100%;
        max-width: 700px;
        box-shadow:
          0 0 0 1px #1a5aff44,
          0 0 40px rgba(255, 170, 0, 0.35),
          0 0 80px rgba(26, 90, 255, 0.2),
          inset 0 0 40px rgba(26, 90, 255, 0.05);
        animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        display: grid;
        grid-template-columns: auto 1fr;
        grid-template-rows: auto auto auto;
        align-items: center;
        column-gap: 24px;
        row-gap: 8px;
      }
      @keyframes popIn {
        from { transform: scale(0.7); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
      }
      #intro-box .ball-icon {
        font-size: 52px;
        grid-column: 1;
        grid-row: 1 / 3;
        animation: bounce 1s ease infinite alternate;
        align-self: center;
      }
      @keyframes bounce {
        from { transform: translateY(0);    }
        to   { transform: translateY(-8px); }
      }
      #intro-box h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2rem;
        color: #ffaa00;
        letter-spacing: 3px;
        margin: 0;
        text-shadow: 0 0 20px rgba(255, 170, 0, 0.7);
        grid-column: 2;
        grid-row: 1;
        text-align: left;
      }
      #intro-box p {
        font-family: 'Rajdhani', sans-serif;
        font-size: 1.1rem;
        color: #ccd9ff;
        line-height: 1.5;
        margin: 0;
        grid-column: 2;
        grid-row: 2;
        text-align: left;
      }
      #intro-box p span {
        color: #1a8fff;
        font-size: 1.2rem;
        text-shadow: 0 0 12px rgba(26, 143, 255, 0.6);
      }
      #intro-box .btn-wrap {
        grid-column: 1 / 3;
        grid-row: 3;
        display: flex;
        justify-content: center;
        padding-top: 16px;
      }
      #btn-start {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.4rem;
        letter-spacing: 3px;
        color: #fff;
        background: linear-gradient(135deg, #ffaa00, #ff8800);
        border: 2px solid #1a5aff;
        border-radius: 50px;
        padding: 12px 48px;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s;
        box-shadow: 0 4px 24px rgba(255,170,0,0.5), 0 0 0 2px #1a5aff33;
        touch-action: manipulation;
      }
      #btn-start:hover,
      #btn-start:active {
        transform: scale(1.06);
        box-shadow: 0 6px 32px rgba(255,170,0,0.7), 0 0 0 3px #1a5affaa;
      }

      /* ── Cuenta regresiva ── */
      #countdown-overlay {
        position: fixed;
        inset: 0;
        z-index: 9998;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 10, 30, 0.6);
        backdrop-filter: blur(2px);
      }
      #countdown-overlay.active { display: flex; }
      #countdown-number {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 18vw;
        color: #fff;
        text-shadow:
          0 0 40px rgba(255, 170, 0, 0.9),
          0 0 80px rgba(26, 90, 255, 0.5);
        line-height: 1;
      }
      #countdown-number.pulse {
        animation: countPulse 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes countPulse {
        from { transform: scale(1.8); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
      }

      /* ── Espera de carga ── */
      #waiting-overlay {
        position: fixed;
        inset: 0;
        z-index: 9997;
        background: rgba(0, 10, 30, 0.92);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        backdrop-filter: blur(3px);
      }
      #waiting-overlay.active { display: flex; }
      #waiting-overlay .loading-ball {
        font-size: 52px;
        animation: spinBall 1s linear infinite;
      }
      @keyframes spinBall {
        from { transform: rotate(0deg);   }
        to   { transform: rotate(360deg); }
      }
      #waiting-overlay p {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.4rem;
        color: #ffaa00;
        letter-spacing: 3px;
        text-shadow: 0 0 16px rgba(255,170,0,0.6);
        text-align: center;
        margin: 0;
      }
      #waiting-overlay span {
        font-family: 'Rajdhani', sans-serif;
        font-size: 0.95rem;
        color: #1a8fff;
        letter-spacing: 1px;
        text-align: center;
      }

      #unity-build-title { display: none !important; }
    </style>
  </head>
  <body>

    <!-- 1. Girar al inicio (portrait → landscape) -->
    <div id="rotate-overlay">
      <div class="rotate-icon">📱</div>
      <h2>GIRA TU DISPOSITIVO</h2>
      <p>El juego se ve mejor en horizontal</p>
    </div>

    <!-- 2. Girar al terminar (landscape → portrait) + botón continuar -->
    <div id="end-rotate-overlay">
      <div class="rotate-icon-end">📱</div>
      <h2>¡LISTO!</h2>
      <p>Gira tu dispositivo para continuar</p>
      <button id="btn-continuar" onclick="irAlMenu()">CONTINUAR</button>
    </div>

    <!-- 3. Instrucciones -->
    <div id="intro-overlay">
      <div id="intro-box">
        <div class="ball-icon">⚽</div>
        <h1>¡A PATEAR!</h1>
        <p>
          <span>Pulsa en la pantalla</span> donde quieras colocar el tiro.<br>
          ¡Apunta bien y marca gol!
        </p>
        <div class="btn-wrap">
          <button id="btn-start" onclick="startCountdown()">¡JUGAR!</button>
        </div>
      </div>
    </div>

    <!-- 4. Espera de carga -->
    <div id="waiting-overlay">
      <div class="loading-ball">⚽</div>
      <p>CARGANDO PARTIDO...</p>
      <span>La cuenta regresiva comenzará al terminar</span>
    </div>

    <!-- 5. Cuenta regresiva -->
    <div id="countdown-overlay">
      <div id="countdown-number">3</div>
    </div>

    <!-- 6. Canvas de Unity -->
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Super Goalie Basic</div>
      </div>
    </div>

    <script>
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      // ── Orientación al inicio ──────────────────────────────────────────
      function checkOrientation() {
        if (!isMobile) {
          document.getElementById('intro-overlay').classList.add('visible');
          return;
        }
        var portrait = window.innerHeight > window.innerWidth;
        document.getElementById('rotate-overlay').classList.toggle('visible', portrait);
        document.getElementById('intro-overlay').classList.toggle('visible', !portrait);
      }

      window.addEventListener('resize', checkOrientation);
      window.addEventListener('orientationchange', function() {
        setTimeout(checkOrientation, 150);
      });
      checkOrientation();

      // ── Pantalla completa ──────────────────────────────────────────────
      function entrarFullscreen() {
        var el = document.documentElement;
        if      (el.requestFullscreen)       el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
      }

      function salirFullscreen() {
        if      (document.exitFullscreen)       document.exitFullscreen().catch(function(){});
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.mozCancelFullScreen)  document.mozCancelFullScreen();
      }

      // ── Ir al menú principal ───────────────────────────────────────────
      function irAlMenu() {
        salirFullscreen();
        // Desbloquear orientación en Android
        if (screen.orientation && screen.orientation.unlock) {
          screen.orientation.unlock();
        }
        // Regresar a la página anterior (el index principal)
        history.back();
      }

      // ── Mostrar overlay de fin y pedir girar ───────────────────────────
      function mostrarFinDeJuego() {
        salirFullscreen();

        if (!isMobile) {
          // En desktop ir directo al menú sin overlay
          irAlMenu();
          return;
        }

        // En móvil: mostrar overlay con animación y botón continuar
        document.getElementById('end-rotate-overlay').classList.add('visible');

        // Si el usuario ya está en portrait, habilitar continuar automático
        // Si gira solo también lo detectamos
        window.addEventListener('orientationchange', function onEndOrient() {
          setTimeout(function() {
            var portrait = window.innerHeight > window.innerWidth;
            if (portrait) {
              window.removeEventListener('orientationchange', onEndOrient);
              // Ya giró solo, el botón sigue visible por si quiere presionarlo
            }
          }, 200);
        });
      }

      // ── Estas funciones las llama Unity desde C# (DllImport __Internal) ─
      function NotifyGoalScored()        { mostrarFinDeJuego(); }
      function NotifyGoalMissed()        { mostrarFinDeJuego(); }
      function NotifyPracticaTerminada() { mostrarFinDeJuego(); }

      // ── Estado de carga ────────────────────────────────────────────────
      var unityLoaded    = false;
      var userClickedPlay = false;

      // ── Cuenta regresiva ───────────────────────────────────────────────
      function tryStartCountdown() {
        if (!unityLoaded || !userClickedPlay) return;
        var overlay = document.getElementById('countdown-overlay');
        var numEl   = document.getElementById('countdown-number');
        overlay.classList.add('active');

        var count = 3;
        numEl.textContent = count;
        triggerPulse(numEl);

        var interval = setInterval(function() {
          count--;
          if (count > 0) {
            numEl.textContent = count;
            triggerPulse(numEl);
          } else {
            clearInterval(interval);
            numEl.textContent = '¡YA!';
            triggerPulse(numEl);
            setTimeout(function() {
              overlay.classList.remove('active');
            }, 800);
          }
        }, 1000);
      }

      function startCountdown() {
        userClickedPlay = true;
        document.getElementById('intro-overlay').classList.remove('visible');

        // Entrar a pantalla completa al presionar JUGAR
        entrarFullscreen();

        if (unityLoaded) {
          tryStartCountdown();
        } else {
          document.getElementById('waiting-overlay').classList.add('active');
        }
      }

      function triggerPulse(el) {
        el.classList.remove('pulse');
        void el.offsetWidth;
        el.classList.add('pulse');
      }

      // ── Unity loader ───────────────────────────────────────────────────
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl  = "Build";
      var loaderUrl = buildUrl + "/05.05.loader.js";
      var config = {
        arguments: [],
        dataUrl:          buildUrl + "/05.05.data",
        frameworkUrl:     buildUrl + "/05.05.framework.js",
        codeUrl:          buildUrl + "/05.05.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName:   "DefaultCompany",
        productName:   "Super Goalie Basic",
        productVersion: "0.1",
        showBanner: unityShowBanner,
      };

      if (isMobile) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width  = "960px";
        canvas.style.height = "600px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function() {
        createUnityInstance(canvas, config, function(progress) {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then(function(unityInstance) {
          document.querySelector("#unity-loading-bar").style.display = "none";

          // ── Desbloquear audio en iOS/iPad ──
          var AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (AudioCtx) {
            var audioCtx = new AudioCtx();
            function unlockAudio() {
              if (audioCtx.state === 'suspended') audioCtx.resume();
              var buf = audioCtx.createBuffer(1, 1, 22050);
              var src = audioCtx.createBufferSource();
              src.buffer = buf;
              src.connect(audioCtx.destination);
              src.start(0);
              document.removeEventListener('touchstart', unlockAudio);
              document.removeEventListener('touchend',   unlockAudio);
              document.removeEventListener('click',      unlockAudio);
            }
            document.addEventListener('touchstart', unlockAudio, { once: true });
            document.addEventListener('touchend',   unlockAudio, { once: true });
            document.addEventListener('click',      unlockAudio, { once: true });
          }

          // ── Unity listo ──
          unityLoaded = true;
          document.getElementById('waiting-overlay').classList.remove('active');
          tryStartCountdown();

          document.querySelector("#unity-fullscreen-button").onclick = function() {
            unityInstance.SetFullscreen(1);
          };

        }).catch(function(message) {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
